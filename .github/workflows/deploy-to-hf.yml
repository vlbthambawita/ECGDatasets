name: Deploy to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'hf_space/**'
      - 'analysis/**'
      - '.github/workflows/deploy-to-hf.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Validate HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is not set."
            echo "::error::Go to Settings → Secrets → Actions and add a HuggingFace write token for the Space."
            exit 1
          fi
          echo "HF_TOKEN is set (length: ${#HF_TOKEN})"

      - name: Install huggingface_hub
        run: pip install -q "huggingface_hub>=0.23"

      # ── Step 1: Upload clean CSVs to HF Dataset (optional) ───────────────
      # Requires HF_DATASET_TOKEN with write access to SEARCH-IHI/ECGData_clean_splits.
      # If not set this step warns and skips; the Space deploy always continues.
      - name: Upload clean CSVs to HuggingFace Dataset
        env:
          HF_DATASET_TOKEN: ${{ secrets.HF_DATASET_TOKEN }}
        run: |
          if [ -z "${HF_DATASET_TOKEN}" ]; then
            echo "::warning::HF_DATASET_TOKEN not set — skipping CSV upload to SEARCH-IHI/ECGData_clean_splits."
            echo "To enable: add HF_DATASET_TOKEN in Settings → Secrets → Actions."
            exit 0
          fi

          python - <<'PYEOF'
          import os, glob, sys
          from huggingface_hub import HfApi

          HF_DATASET = "SEARCH-IHI/ECGData_clean_splits"
          api = HfApi(token=os.environ["HF_DATASET_TOKEN"])

          csv_files = sorted(glob.glob("analysis/*/clean_records.csv"))
          if not csv_files:
              print("No clean_records.csv files found in analysis/ — nothing to upload.")
              sys.exit(0)

          for csv_path in csv_files:
              dataset_name = csv_path.split("/")[1]
              repo_path = f"{dataset_name}/clean_records.csv"
              print(f"Uploading {csv_path} → {HF_DATASET}/{repo_path} ...")
              api.upload_file(
                  path_or_fileobj=csv_path,
                  path_in_repo=repo_path,
                  repo_id=HF_DATASET,
                  repo_type="dataset",
                  commit_message=f"Update {repo_path} from GitHub Actions",
              )
              print(f"  ✓ Done")
          PYEOF

      # ── Step 2: Deploy docs/ to HF Space ─────────────────────────────────
      # Uses upload_folder() — authenticates with the token alone, no username needed.
      - name: Deploy docs/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          import os, shutil
          from pathlib import Path
          from huggingface_hub import HfApi

          HF_SPACE = "SEARCH-IHI/ECGDatasets"
          api = HfApi(token=os.environ["HF_TOKEN"])

          # Build a staging folder: docs/ content + hf_space/README.md on top
          staging = Path("_hf_staging")
          if staging.exists():
              shutil.rmtree(staging)
          shutil.copytree("docs", staging)
          shutil.copy("hf_space/README.md", staging / "README.md")

          print(f"Uploading to https://huggingface.co/spaces/{HF_SPACE} ...")
          api.upload_folder(
              folder_path=str(staging),
              repo_id=HF_SPACE,
              repo_type="space",
              commit_message=f"Deploy from GitHub: {os.environ.get('GITHUB_SHA', 'unknown')[:12]}",
              delete_patterns=["*"],   # wipe stale files in the Space before uploading
          )
          print(f"✓ Successfully deployed to https://huggingface.co/spaces/{HF_SPACE}")
          PYEOF
