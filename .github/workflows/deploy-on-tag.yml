name: Deploy on Tag

# Tag naming convention:
#   v1.0.0          → deploy Space + Dataset
#   v1.0.0-space    → deploy Space only
#   v1.0.0-data     → deploy Dataset only
#
# Tag name + date appear as a version badge in the website header and HF Space.

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # ── Determine what to deploy ──────────────────────────────────────────
      - name: Set deployment targets
        id: targets
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DEPLOY_SPACE=false
          DEPLOY_DATA=false

          if [[ "${TAG}" == *-data ]]; then
            DEPLOY_DATA=true
          elif [[ "${TAG}" == *-space ]]; then
            DEPLOY_SPACE=true
          else
            # plain vX.Y.Z tag → both
            DEPLOY_SPACE=true
            DEPLOY_DATA=true
          fi

          echo "tag=${TAG}"                    >> "$GITHUB_OUTPUT"
          echo "deploy_space=${DEPLOY_SPACE}"  >> "$GITHUB_OUTPUT"
          echo "deploy_data=${DEPLOY_DATA}"    >> "$GITHUB_OUTPUT"

          echo "Tag     : ${TAG}"
          echo "Space   : ${DEPLOY_SPACE}"
          echo "Dataset : ${DEPLOY_DATA}"

      - name: Validate HF_TOKEN secret
        if: steps.targets.outputs.deploy_space == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is not set."
            exit 1
          fi
          echo "HF_TOKEN is set (length: ${#HF_TOKEN})"

      - name: Install huggingface_hub
        run: pip install -q "huggingface_hub>=0.23"

      # ── Step 1: Write _version.json into docs/ ────────────────────────────
      - name: Write _version.json
        run: |
          TAG="${{ steps.targets.outputs.tag }}"
          SHA="${GITHUB_SHA:0:12}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DEPLOY_SPACE="${{ steps.targets.outputs.deploy_space }}"
          DEPLOY_DATA="${{ steps.targets.outputs.deploy_data }}"

          if [ "${DEPLOY_SPACE}" = "true" ] && [ "${DEPLOY_DATA}" = "true" ]; then
            DEPLOY_TARGET="space+dataset"
          elif [ "${DEPLOY_SPACE}" = "true" ]; then
            DEPLOY_TARGET="space"
          elif [ "${DEPLOY_DATA}" = "true" ]; then
            DEPLOY_TARGET="dataset"
          else
            DEPLOY_TARGET="none"
          fi

          cat > docs/_version.json <<EOF
          {
            "tag": "${TAG}",
            "sha": "${SHA}",
            "date": "${DATE}",
            "deploy": "${DEPLOY_TARGET}"
          }
          EOF
          echo "Wrote docs/_version.json:"
          cat docs/_version.json

      # ── Step 2: Upload clean CSVs to HF Dataset ───────────────────────────
      - name: Upload clean CSVs to HuggingFace Dataset
        if: steps.targets.outputs.deploy_data == 'true'
        env:
          HF_DATASET_TOKEN: ${{ secrets.HF_DATASET_TOKEN }}
          DEPLOY_TAG: ${{ steps.targets.outputs.tag }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          if [ -z "${HF_DATASET_TOKEN}" ]; then
            echo "::warning::HF_DATASET_TOKEN not set — skipping CSV upload."
            exit 0
          fi

          python - <<'PYEOF'
          import os, glob, sys
          from huggingface_hub import HfApi

          HF_DATASET = "vlbthambawita/ecg-metadata-curated"
          api = HfApi(token=os.environ["HF_DATASET_TOKEN"])
          tag = os.environ.get("DEPLOY_TAG", "")
          sha = os.environ.get("DEPLOY_SHA", "")[:12]

          csv_files = sorted(glob.glob("analysis/*/clean_records.csv"))
          if not csv_files:
              print("No clean_records.csv files found in analysis/ — nothing to upload.")
              sys.exit(0)

          for csv_path in csv_files:
              dataset_name = csv_path.split("/")[1]
              repo_path = f"{dataset_name}/clean_records.csv"
              msg = f"Update {repo_path} [{tag}] sha:{sha}"
              print(f"Uploading {csv_path} → {HF_DATASET}/{repo_path} ...")
              api.upload_file(
                  path_or_fileobj=csv_path,
                  path_in_repo=repo_path,
                  repo_id=HF_DATASET,
                  repo_type="dataset",
                  commit_message=msg,
              )
              print(f"  ✓ Done")
          PYEOF

      # ── Step 3: Deploy docs/ to HF Space ─────────────────────────────────
      - name: Deploy docs/ to HuggingFace Space
        if: steps.targets.outputs.deploy_space == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEPLOY_TAG: ${{ steps.targets.outputs.tag }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          python - <<'PYEOF'
          import os, shutil
          from pathlib import Path
          from huggingface_hub import HfApi

          HF_SPACE = "vlbthambawita/ECGDatasets"
          api = HfApi(token=os.environ["HF_TOKEN"])
          tag = os.environ.get("DEPLOY_TAG", "")
          sha = os.environ.get("DEPLOY_SHA", "unknown")[:12]

          staging = Path("_hf_staging")
          if staging.exists():
              shutil.rmtree(staging)
          shutil.copytree("docs", staging)
          shutil.copy("hf_space/README.md", staging / "README.md")

          msg = f"Deploy {tag} sha:{sha}"

          print(f"Uploading to https://huggingface.co/spaces/{HF_SPACE} ...")
          api.upload_folder(
              folder_path=str(staging),
              repo_id=HF_SPACE,
              repo_type="space",
              commit_message=msg,
              delete_patterns=["*"],
          )
          print(f"✓ Successfully deployed to https://huggingface.co/spaces/{HF_SPACE}")
          PYEOF
