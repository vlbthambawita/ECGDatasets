name: Deploy on Tag

# Any tag matching v* (e.g. v1.0.0) triggers a full deploy:
#   → HF Space
#   → HF Dataset (clean CSVs)
#   → GitHub Pages (pushes docs/ to main with [skip ci])
#
# Tag name + date appear as a version badge in the website and HF Space.

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # needed to push docs/ back to main for GitHub Pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Get tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is not set. Go to Settings → Secrets → Actions."
            exit 1
          fi
          echo "HF_TOKEN is set (length: ${#HF_TOKEN})"

      - name: Validate HF_DATASET_TOKEN secret
        env:
          HF_DATASET_TOKEN: ${{ secrets.HF_DATASET_TOKEN }}
        run: |
          if [ -z "${HF_DATASET_TOKEN}" ]; then
            echo "::error::HF_DATASET_TOKEN secret is not set. Go to Settings → Secrets → Actions."
            exit 1
          fi
          echo "HF_DATASET_TOKEN is set (length: ${#HF_DATASET_TOKEN})"

      - name: Install huggingface_hub
        run: pip install -q "huggingface_hub>=0.23"

      # ── Step 1: Write _version.json into docs/ ────────────────────────────
      - name: Write _version.json
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          SHA="${GITHUB_SHA:0:12}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > docs/_version.json <<EOF
          {
            "tag": "${TAG}",
            "sha": "${SHA}",
            "date": "${DATE}"
          }
          EOF
          echo "Wrote docs/_version.json:"
          cat docs/_version.json

      # ── Step 2: Upload clean CSVs + dataset card to HF Dataset ──────────
      - name: Upload clean CSVs to HuggingFace Dataset
        env:
          HF_DATASET_TOKEN: ${{ secrets.HF_DATASET_TOKEN }}
          DEPLOY_TAG: ${{ steps.tag.outputs.name }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          python - <<'PYEOF'
          import io, os, glob, sys
          from huggingface_hub import HfApi

          HF_DATASET = "vlbthambawita/ecg-metadata-curated"
          api = HfApi(token=os.environ["HF_DATASET_TOKEN"])
          tag = os.environ.get("DEPLOY_TAG", "")
          sha = os.environ.get("DEPLOY_SHA", "")[:12]

          # Ensure the dataset repo exists (no-op if it already does)
          api.create_repo(repo_id=HF_DATASET, repo_type="dataset",
                          exist_ok=True, private=False)

          csv_files = sorted(glob.glob("analysis/*/clean_records.csv"))
          if not csv_files:
              print("No clean_records.csv files found in analysis/ — nothing to upload.")
              sys.exit(1)

          # Upload CSVs
          rows = []
          for csv_path in csv_files:
              dataset_name = csv_path.split("/")[1]
              repo_path = f"{dataset_name}/clean_records.csv"
              print(f"Uploading {csv_path} → {HF_DATASET}/{repo_path} ...")
              api.upload_file(
                  path_or_fileobj=csv_path,
                  path_in_repo=repo_path,
                  repo_id=HF_DATASET,
                  repo_type="dataset",
                  commit_message=f"Update {repo_path} [{tag}] sha:{sha}",
              )
              import csv as _csv
              with open(csv_path) as f:
                  n = sum(1 for _ in f) - 1  # subtract header
              rows.append((dataset_name, repo_path, n))
              print(f"  ✓ {n:,} records")

          # Upload/update dataset card (README.md) so the HF page shows changes
          table = "\n".join(
              f"| {name} | [{rp}]({rp}) | {n:,} |"
              for name, rp, n in rows
          )
          sep = "---"
          readme = (
              f"{sep}\n"
              "license: cc-by-4.0\n"
              "tags:\n"
              "  - ecg\n"
              "  - medical\n"
              "  - biosignal\n"
              "pretty_name: ECG Metadata - Clean Record Splits\n"
              f"{sep}\n\n"
              "# ECG Metadata - Clean Record Splits\n\n"
              "Clean ECG record IDs curated from the "
              "[ECGDatasets](https://github.com/vlbthambawita/ECGDatasets) catalogue.\n"
              "Each CSV lists the record IDs that pass all quality filters.\n\n"
              f"**Version:** {tag}  \n"
              f"**Commit:** `{sha}`\n\n"
              "## Files\n\n"
              "| Dataset | File | Clean records |\n"
              "|---------|------|---------------|\n"
              f"{table}\n\n"
              f"{sep}\n"
              "*Generated automatically by "
              "[ECGDatasets CI](https://github.com/vlbthambawita/ECGDatasets/actions).*\n"
          )
          api.upload_file(
              path_or_fileobj=io.BytesIO(readme.encode()),
              path_in_repo="README.md",
              repo_id=HF_DATASET,
              repo_type="dataset",
              commit_message=f"Update dataset card [{tag}] sha:{sha}",
          )
          print("✓ Dataset card (README.md) updated")
          PYEOF

      # ── Step 3: Deploy docs/ to HF Space ─────────────────────────────────
      - name: Deploy docs/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEPLOY_TAG: ${{ steps.tag.outputs.name }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          python - <<'PYEOF'
          import os, shutil
          from pathlib import Path
          from huggingface_hub import HfApi

          HF_SPACE = "vlbthambawita/ECGDatasets"
          api = HfApi(token=os.environ["HF_TOKEN"])
          tag = os.environ.get("DEPLOY_TAG", "")
          sha = os.environ.get("DEPLOY_SHA", "unknown")[:12]

          staging = Path("_hf_staging")
          if staging.exists():
              shutil.rmtree(staging)
          shutil.copytree("docs", staging)
          shutil.copy("hf_space/README.md", staging / "README.md")

          print(f"Uploading to https://huggingface.co/spaces/{HF_SPACE} ...")
          api.upload_folder(
              folder_path=str(staging),
              repo_id=HF_SPACE,
              repo_type="space",
              commit_message=f"Deploy {tag} sha:{sha}",
              delete_patterns=["*"],
          )
          print(f"✓ Successfully deployed to https://huggingface.co/spaces/{HF_SPACE}")
          PYEOF

      # ── Step 4: Push docs/ to main so GitHub Pages updates ───────────────
      - name: Push docs/ to main for GitHub Pages
        run: |
          TAG="${{ steps.tag.outputs.name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Snapshot docs/ from the tag commit (including _version.json just written)
          cp -r docs/ /tmp/docs_snapshot

          # Discard all local changes in docs/ so the branch switch succeeds.
          # git restore handles modified tracked files (e.g. _version.json);
          # git clean handles any untracked files.
          git restore docs/ 2>/dev/null || true
          git clean -fd docs/

          # Switch to main
          git fetch origin main
          git checkout main

          # Replace docs/ with the tag's version
          rm -rf docs/
          cp -r /tmp/docs_snapshot docs/

          git add docs/
          if git diff --staged --quiet; then
            echo "docs/ on main already matches — no update needed"
          else
            git commit -m "chore: deploy docs for ${TAG} [skip ci]"
            git push origin main
            echo "✓ Pushed docs/ to main — GitHub Pages will update shortly"
          fi
